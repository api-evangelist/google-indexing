aid: google-indexing
name: Google Indexing
description: >-
  The Google Indexing API allows site owners to directly notify Google when
  pages are added or removed. It enables requesting crawling for updated
  content and notifying of page removals, leading to fresher content in
  search results. Primarily intended for sites with job postings or
  livestream structured data.
